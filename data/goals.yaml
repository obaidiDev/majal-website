# The problem Majal solves, its solution, goals, vision and beneficiaries.
problem:
  title: التحدي الذي نعالجه
  body: >
    المجالات التقنية بحرٌ لا ينضب بل يتزايد، لأن التقنية تتطوّر باستمرار. وهذا
    يضع الطلاب في حيرة عند اختيار المجال المناسب لهم، فقد يتّخذون قرارًا غير
    مناسب، أو يُحجمون عن تطوير مهاراتهم التقنية من الأساس.
solution:
  title: حلّنا
  body: >
    تقدّم مبادرة مجال برنامجًا صيفيًا مكثّفًا وورشًا عملية على مدار السنة. كل
    مجال يُغطّى بـ ٤٠ ساعة من التعليم النظري والتطبيق العملي، ليجرّب الطالب
    المجال على أرض الواقع قبل أن يقرّر — فالتجربة خير برهان.

goals:
  - icon: compass
    title: اكتشاف المجال المناسب
    body: مساعدة الطلاب على اختيار مجالهم التقني المناسب لهم عن طريق التجربة العملية.
  - icon: rocket
    title: تطوير المهارات مبكرًا
    body: تمكين الطلاب من تطوير مهاراتهم التقنية في وقتٍ مبكر ليتميّزوا في سوق العمل.
  - icon: spark
    title: رفع الثقة بالنفس
    body: رفع ثقة الطلاب بأنفسهم وتشجيعهم على التعلّم والتطوّر الذاتي.
  - icon: broadcast
    title: نشر الوعي التقني
    body: >
      نشر الوعي بمجالات المستقبل كالذكاء الاصطناعي والأمن السيبراني وعلم البيانات
      وتطوير الويب.
  - icon: briefcase
    title: التأهيل لسوق العمل
    body: تأهيل المشاركين لسوق العمل الرقمي عبر ورش تدريبية وتجارب عملية ومهارية.
  - icon: link
    title: ربط الأكاديمي بالمهني
    body: ربط الجانب الأكاديمي بالواقع المهني والتقني الحديث.

vision:
  title: رؤيتنا المستقبلية
  items:
    - التوسّع في تقديم البرامج التقنية المتخصصة في مختلف مناطق المملكة.
    - بناء شراكات مع جهات تعليمية وتقنية لدعم المواهب الشبابية.
    - التوسّع في بناء مجالات تقنية حديثة كالتحوّل الرقمي والروبوتات وغيرها.

beneficiaries:
  title: من هم المستفيدون؟
  body: >
    طلاب الثانوي والجامعات الذين يواجهون صعوبة في تحديد مجالهم التقني المناسب
    لهم، أو في الإبداع فيه.
