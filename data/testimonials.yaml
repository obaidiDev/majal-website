# Selected, lightly-cleaned beneficiary feedback drawn from the program surveys.
items:
  - quote: >
      مبادرة تمنّيت لو أنها موجودة قبل أن أضيّع ٤ سنوات في تخصّص لا يناسبني!
      خلال أسبوعين فقط قدرتوا تخلّوني أكتشف أن علوم الحاسب هو التخصّص الذي
      يناسبني. شكرًا لأنكم ساعدتوني ما أضيّع سنين زيادة.
    field: تطوير المواقع
  - quote: >
      دخلت وأنا لست متحمّسة للمجال، مجبورة آخذ نظرة عشان مشروع تخرّجي، وطلعت
      محبّة للمجال وأريد أن أكمل فيه. غرستم فيّ شعورًا جميلًا ومعلوماتٍ قيّمة،
      ومصدر فخر أن هذا كله من صنع سعوديين وسعوديات.
    field: الذكاء الاصطناعي
  - quote: >
      مبادرة ممتازة وفريدة من نوعها، لأنها أخيرًا لبّت حاجة كنا ننتظرها: أن
      نطبّق عمليًا ما نتعلّمه، فتتوضّح لنا صورة المجال ونعرف هل هو مجالنا أم لا.
    field: الأمن السيبراني
  - quote: >
      للمرّة الثانية أنبهر بعمق المحتوى وفائدته. البرنامج ثريّ مليء بالتطبيقات
      العملية التي تفيدنا وتهيّئنا لسوق العمل. ممتنّة جدًا لجهودكم.
    field: علم البيانات
  - quote: >
      مبادرة رائعة، درّبتنا على المهارات العملية التي يفتقدها أغلب طلاب الحاسب
      من الجامعة. لو كنت أعرف أن مستوى المبادرة بهذا الشكل لسجّلت في المجالات
      الأربعة.
    field: الأمن السيبراني
  - quote: >
      خلال أربعة أيام تنقلني من الصفر إلى أن أعرف كيف يعمل الذكاء الاصطناعي
      وأقدر أبني نموذجًا بنفسي. طريقة الشرح مع التطبيق تخلّينا ما ننسى.
    field: الذكاء الاصطناعي
  - quote: >
      ساعدتني المبادرة على التعرّف أكثر على مجال تطوير المواقع بأفضل طريقة
      ممكنة، بمساعدة مدرّبين ما قصّروا في شرحهم الإبداعي.
    field: تطوير المواقع
  - quote: >
      الورشة كانت مفيدة للغاية وأعطتني نظرة أوضح في هذا المجال، وكانت تجربة
      إثرائية ممتعة.
    field: ورشة الذكاء الاصطناعي التوكيلي
  - quote: >
      أفضل الورش التي حضرتها… محاضر عظيم جدًا، يعيد النقطة مرّة ومرّتين ويتأكّد
      أن الجميع فهم.
    field: ورشة الحوسبة الكمية
  - quote: >
      مبادرة وفّرت فرص تعلّم وتطوير حقيقية في مجالات مهمة، بأسلوبٍ بسيط ومتاح
      للجميع. فعلًا فخور بهذه المبادرة.
    field: الأمن السيبراني
